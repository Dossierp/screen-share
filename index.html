<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Invitado - Screen Share PRO - DP</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --green: #00c853; --red: #d50000; --blue: #2979ff; --black: #000; }
        body { margin: 0; background: var(--black); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .branding { text-align: center; margin-bottom: 10px; }
        .title { font-size: 2.2em; font-weight: bold; }
        .subtitle { font-size: 1.1em; color: #888; }
        video { width: 60vw; max-height: 40vh; background: #050505; border: 2px solid #333; border-radius: 12px; margin-top: 10px; }
        .panel { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; width: 360px; margin-top: 10px; }
        button { padding: 15px; margin: 5px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; font-size: 1em; }
        .btn-share { background: var(--green); color: white; }
        .btn-stop { background: var(--red) !important; }
        #modal-portero { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .modal-box { background: #1a1a1a; padding: 40px; border-radius: 20px; border: 2px solid var(--blue); text-align: center; }
    </style>
</head>
<body>
    <div class="branding">
        <div class="title">SCREEN SHARE PRO - DP</div>
        <div class="subtitle">www.dossierproducciones.com</div>
    </div>
    <video id="vLocal" autoplay playsinline muted></video>
    <div class="panel">
        <button id="btnS" class="btn-share" onclick="preparar()">Compartir pantalla</button>
        <button style="background:var(--blue); color:white" onclick="copiar()">Copiar Link para vMix</button>
        <div id="status" style="margin-top:10px; color: #666;">ID: Cargando...</div>
    </div>

    <div id="modal-portero">
        <div class="modal-box">
            <h2 style="margin:0">SOLICITUD DE vMix</h2>
            <p>¿Autorizar envío de señal?</p>
            <div style="display:flex; gap:20px; margin-top:20px;">
                <button style="background:var(--green); color:white" onclick="voto(true)">YES</button>
                <button style="background:var(--red); color:white" onclick="voto(false)">NO</button>
            </div>
        </div>
    </div>

    <script>
        const peer = new Peer();
        let stream = null;
        let callActiva = null;
        let autorizadoId = null;

        peer.on('open', id => document.getElementById('status').innerText = "TU ID: " + id);

        async function preparar() {
            try {
                stream = await navigator.mediaDevices.getDisplayMedia({ video: { width: 1920, height: 1080, frameRate: 60 }, audio: true });
                document.getElementById('vLocal').srcObject = stream;
                document.getElementById('btnS').innerText = "Dejar de compartir";
                document.getElementById('btnS').classList.add('btn-stop');
                stream.getVideoTracks()[0].onended = () => location.reload();
            } catch (e) { console.error(e); }
        }

        function copiar() {
            const link = window.location.href.split('index.html')[0] + "remoto.html?id=" + peer.id;
            navigator.clipboard.writeText(link).then(() => alert("Link copiado para vMix"));
        }

        peer.on('call', call => {
            // Si ya autorizamos a este ID antes, contestar automáticamente sin preguntar
            if (autorizadoId === call.peer) {
                call.answer(stream);
                return;
            }
            callActiva = call;
            document.getElementById('modal-portero').style.display = 'flex';
        });

        function voto(si) {
            document.getElementById('modal-portero').style.display = 'none';
            if (si && stream) {
                autorizadoId = callActiva.peer;
                callActiva.answer(stream);
            } else {
                callActiva.close();
            }
        }
    </script>
</body>
</html>
