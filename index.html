<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Screen Share PRO - DP - Dossier Producciones</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --green: #00c853; --red: #d50000; --blue: #2979ff; --black: #000; --panel: #111; }
        body { margin: 0; background: var(--black); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .branding { text-align: center; margin-bottom: 10px; }
        .title { font-size: 2.2em; font-weight: bold; }
        .subtitle { font-size: 1.1em; color: #888; margin-top: 5px; }
        video { width: 90vw; max-height: 55vh; background: #050505; border: 2px solid #333; border-radius: 12px; margin-top: 10px; }
        .panel { background: var(--panel); padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; width: 360px; margin-top: 10px; position: relative; }
        #id-display { color: var(--green); font-size: 0.9em; font-weight: bold; margin-bottom: 15px; border: 1px dashed #333; padding: 8px; border-radius: 5px; word-break: break-all; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #444; margin-bottom: 10px; width: 90%; background: #000; color: var(--green); text-align: center; font-family: monospace; font-size: 1.1em; }
        
        button { padding: 15px; margin: 5px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; font-size: 0.95em; }
        .btn-share { background: var(--green); color: white; }
        .btn-view { background: var(--blue); color: white; }
        .btn-stop { background: var(--red) !important; color: white; }

        /* Modal de Autorización */
        #auth-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; border: 2px solid var(--blue); padding: 30px; border-radius: 15px; z-index: 100; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-yes { background: var(--green); }
        .btn-no { background: var(--red); }
    </style>
</head>
<body>

    <div class="branding">
        <div class="title">SCREEN SHARE PRO - DP</div>
        <div class="subtitle">www.dossierproducciones.com</div>
    </div>
    
    <video id="mainVideo" autoplay playsinline></video>

    <div class="panel">
        <div id="id-display">CONECTANDO AL SERVIDOR...</div>
        
        <button id="shareBtn" class="btn-share" onclick="toggleShare()">Compartir mi pantalla</button>
        <hr style="border: 0.5px solid #222; margin: 15px 0;">
        <input type="text" id="peer-id-input" placeholder="PEGAR ID AQUÍ">
        <button id="viewBtn" class="btn-view" onclick="toggleView()">Ver pantalla remota</button>
    </div>

    <div id="auth-modal">
        <h3 id="auth-msg">¿Autorizar conexión entrante?</h3>
        <div class="modal-btns">
            <button class="btn-yes" onclick="handleAuth(true)">YES</button>
            <button class="btn-no" onclick="handleAuth(false)">NO</button>
        </div>
    </div>

    <script>
        const videoElem = document.getElementById('mainVideo');
        const shareBtn = document.getElementById('shareBtn');
        const viewBtn = document.getElementById('viewBtn');
        const modal = document.getElementById('auth-modal');
        const peer = new Peer();
        
        let localStream = null;
        let currentCall = null;
        let incomingCall = null;

        peer.on('open', (id) => {
            document.getElementById('id-display').innerText = "TU ID: " + id;
        });

        // --- LÓGICA DE COMPARTIR (INVITADO) ---
        async function toggleShare() {
            if (!localStream) {
                try {
                    localStream = await navigator.mediaDevices.getDisplayMedia({ 
                        video: { width: 1280, height: 720, frameRate: 60 }, 
                        audio: true 
                    });
                    videoElem.srcObject = localStream;
                    shareBtn.innerText = "Dejar de compartir";
                    shareBtn.classList.add('btn-stop');
                    
                    // Si el usuario da click al "Stop Sharing" nativo del navegador
                    localStream.getVideoTracks()[0].onended = () => stopShareAction();
                } catch (err) { console.error(err); }
            } else {
                stopShareAction();
            }
        }

        function stopShareAction() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            videoElem.srcObject = null;
            shareBtn.innerText = "Compartir mi pantalla";
            shareBtn.classList.remove('btn-stop');
        }

        // --- LÓGICA DE VER (PRODUCTOR) ---
        function toggleView() {
            if (!currentCall) {
                const remoteId = document.getElementById('peer-id-input').value.trim();
                if (!remoteId) return alert("Pega un ID");
                
                // Productor inicia llamada
                currentCall = peer.call(remoteId, new MediaStream());
                viewBtn.innerText = "Dejar de ver";
                viewBtn.classList.add('btn-stop');

                currentCall.on('stream', (remoteStream) => {
                    videoElem.srcObject = remoteStream;
                    videoElem.play();
                });

                currentCall.on('close', () => stopViewAction());
            } else {
                stopViewAction();
            }
        }

        function stopViewAction() {
            if (currentCall) currentCall.close();
            currentCall = null;
            videoElem.srcObject = null;
            viewBtn.innerText = "Ver pantalla remota";
            viewBtn.classList.remove('btn-stop');
        }

        // --- EL PORTERO (YES/NO) ---
        peer.on('call', (call) => {
            incomingCall = call;
            document.getElementById('auth-msg').innerText = "Un usuario solicita ver tu pantalla";
            modal.style.display = 'block';
        });

        function handleAuth(accepted) {
            modal.style.display = 'none';
            if (accepted && incomingCall) {
                incomingCall.answer(localStream); // Envía los 720p autorizados
            } else if (incomingCall) {
                incomingCall.close();
            }
        }
    </script>
</body>
</html>
