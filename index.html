<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Screen Share PRO - DP - Dossier Producciones</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .branding { text-align: center; margin-bottom: 20px; }
        .title { font-size: 2em; font-weight: bold; }
        .subtitle { font-size: 1em; color: #bbb; }
        video { width: 80vw; max-height: 60vh; background: #050505; border: 2px solid #333; border-radius: 10px; object-fit: contain; }
        .panel { background: #1a1a1a; padding: 20px; border-radius: 15px; text-align: center; margin-top: 15px; width: 350px; }
        input { padding: 12px; border-radius: 5px; border: 1px solid #444; margin-bottom: 12px; width: 100%; text-align: center; background: #222; color: #eee; }
        button { padding: 12px 25px; margin: 5px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-share { background: #00c853; color: white; }
        .btn-view { background: #2979ff; color: white; }
        #id-display { color: #00e676; font-size: 1.1em; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="branding">
        <div class="title">SCREEN SHARE PRO - DP</div>
        <div class="subtitle">www.dossierproducciones.com</div>
    </div>
    
    <video id="remoteVideo" autoplay playsinline></video>

    <div class="panel">
        <div id="id-display">Cargando ID...</div>
        
        <button class="btn-share" onclick="startSharing()">COMPARTIR MI PANTALLA</button>
        
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        
        <input type="text" id="peer-id-input" placeholder="Pega aquí el ID del invitado">
        <button class="btn-view" onclick="connectToPeer()">VER PANTALLA REMOTA</button>
    </div>

    <script>
        const peer = new Peer(); // ID automático
        let localStream;

        peer.on('open', (id) => {
            document.getElementById('id-display').innerText = "TU ID: " + id;
        });

        async function startSharing() {
            try {
                localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                document.getElementById('remoteVideo').srcObject = localStream;
                // El invitado ve su propia captura
            } catch (err) { console.error(err); }
        }

        function connectToPeer() {
            const remoteId = document.getElementById('peer-id-input').value;
            if (!remoteId) return alert("Pega el ID del invitado.");
            
            const call = peer.call(remoteId, localStream || new MediaStream());
            
            call.on('stream', (userVideoStream) => {
                document.getElementById('remoteVideo').srcObject = userVideoStream;
                // Tú ves la pantalla del invitado
            });
        }

        peer.on('call', (call) => {
            call.answer(localStream);
            call.on('stream', (userVideoStream) => {
                document.getElementById('remoteVideo').srcObject = userVideoStream;
            });
        });
    </script>
</body>
</html>
