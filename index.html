<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dossier Connect</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 40px; border-radius: 20px; text-align: center; border: 2px solid #38bdf8; width: 450px; }
        h2 { color: #38bdf8; margin: 0 0 20px 0; letter-spacing: 2px; }
        button { background: #000; border: 2px solid #38bdf8; color: white; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; margin: 10px 0; font-weight: bold; }
        button:hover { background: #38bdf8; color: #000; }
        video { width: 100%; border-radius: 10px; margin-top: 20px; background: #000; aspect-ratio: 16/9; }
        #status { font-size: 11px; color: #94a3b8; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>DOSSIER PRODUCCIONES</h2>
        <button onclick="iniciar('screen')">🖥️ COMPARTIR PANTALLA</button>
        <button onclick="iniciar('camera')">📷 COMPARTIR CÁMARA</button>
        <video id="preview" autoplay muted playsinline></video>
        <div id="status">ESTADO: INICIALIZANDO...</div>
    </div>
    <script>
        const ID_UNICO = 'DOSSIER-PROD-2026'; 
        const peer = new Peer(ID_UNICO, { config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] } });
        let localStream;
        peer.on('open', () => { document.getElementById('status').innerText = "LISTO PARA TRANSMITIR"; });
        peer.on('call', call => { if (localStream) call.answer(localStream); });
        async function iniciar(tipo) {
            try {
                localStream = (tipo === 'screen') 
                    ? await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true })
                    : await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('preview').srcObject = localStream;
                document.getElementById('status').innerText = "EN VIVO - ESPERANDO VMIX";
            } catch (e) { alert("Error de permisos: " + e); }
        }
    </script>
</body>
</html>
