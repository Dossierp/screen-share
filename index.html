<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Share Pro - Dossier Producciones</title>
    <style>
        body { margin: 0; background-color: #000; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        video { width: 95vw; height: 80vh; border: 2px solid #333; background: #050505; border-radius: 8px; }
        .controls { margin-top: 20px; display: flex; gap: 15px; }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; transition: 0.3s; }
        .btn-start { background-color: #00c853; color: white; }
        .btn-stop { background-color: #d50000; color: white; }
        button:hover { opacity: 0.8; transform: scale(1.05); }
    </style>
</head>
<body>
    <h2>SCREEN SHARE PRO</h2>
    <video id="preview" autoplay playsinline></video>
    <div class="controls">
        <button class="btn-start" onclick="startCapture()">COMPARTIR PANTALLA</button>
        <button class="btn-stop" onclick="stopCapture()">DETENER</button>
    </div>

    <script>
        const videoElem = document.getElementById("preview");
        let displayStream = null;

        async function startCapture() {
            const displayOptions = {
                video: { cursor: "always", frameRate: 60 }, // Aprovechamos tus 60fps
                audio: { echoCancellation: true, noiseSuppression: true }
            };
            try {
                displayStream = await navigator.mediaDevices.getDisplayMedia(displayOptions);
                videoElem.srcObject = displayStream;
            } catch (err) {
                console.error("Error: " + err);
            }
        }

        function stopCapture() {
            let tracks = videoElem.srcObject.getTracks();
            tracks.forEach(track => track.stop());
            videoElem.srcObject = null;
        }
    </script>
</body>
</html>
