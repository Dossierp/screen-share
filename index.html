<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dossier Presenter - LAPTOP 1</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>LAPTOP 1</h2>
        <div class="grid">
            <button onclick="startShare('screen')">
                <span class="icon">🖥️</span>
                Presentación
            </button>
            <button onclick="startShare('camera')">
                <span class="icon">📷</span>
                Cámara Web
            </button>
        </div>
        <video id="preview" autoplay muted playsinline></video>
        <p id="status">Estado: Esperando acción...</p>
    </div>

    <script>
        const peer = new Peer('DOSSIER-SLOT-1'); // ID Fijo para que vMix sepa a quién buscar
        let localStream;

        async function startShare(type) {
            try {
                if (type === 'screen') {
                    localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                } else {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                }
                
                document.getElementById('preview').srcObject = localStream;
                document.getElementById('status').innerText = "Estado: Transmitiendo...";
                
                // Escuchar llamadas entrantes de vMix
                peer.on('call', call => {
                    call.answer(localStream);
                });
            } catch (err) {
                console.error("Error:", err);
            }
        }
    </script>
</body>
</html>
