<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Invitado - Screen Share PRO</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .panel { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; width: 350px; }
        video { width: 60vw; height: 30vh; background: #050505; border: 1px solid #333; margin-bottom: 20px; border-radius: 10px; }
        button { padding: 15px; margin: 10px 0; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; }
        .btn-green { background: #00c853; color: white; }
        .btn-blue { background: #2979ff; color: white; }
        #portero { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <h2>SCREEN SHARE PRO - DP</h2>
    <video id="preview" autoplay playsinline muted></video>
    <div class="panel">
        <button class="btn-green" onclick="prepararPantalla()">1. Preparar Pantalla</button>
        <button class="btn-blue" onclick="copiarLink()">2. Copiar Link vMix</button>
        <div id="status" style="margin-top:10px; color: #888;">Estado: Esperando...</div>
    </div>

    <div id="portero">
        <h1>¿SOLICITUD DE vMix?</h1>
        <div style="display:flex; gap: 20px;">
            <button style="background:#00c853; width: 150px;" onclick="voto(true)">YES</button>
            <button style="background:#d50000; width: 150px;" onclick="voto(false)">NO</button>
        </div>
    </div>

    <script>
        const peer = new Peer();
        let streamLocal = null;
        let llamadaEntrante = null;

        peer.on('open', id => document.getElementById('status').innerText = "Listo. ID: " + id);

        async function prepararPantalla() {
            try {
                streamLocal = await navigator.mediaDevices.getDisplayMedia({ video: { frameRate: 60 }, audio: true });
                document.getElementById('preview').srcObject = streamLocal;
                document.getElementById('status').innerText = "Pantalla lista para transmitir";
            } catch (e) { alert("Error al capturar"); }
        }

        function copiarLink() {
            const link = window.location.href.split('index.html')[0] + "remoto.html?id=" + peer.id;
            navigator.clipboard.writeText(link);
            alert("Link copiado.");
        }

        peer.on('call', call => {
            llamadaEntrante = call;
            document.getElementById('portero').style.display = 'flex';
        });

        function voto(si) {
            document.getElementById('portero').style.display = 'none';
            if (si && streamLocal) {
                llamadaEntrante.answer(streamLocal);
                document.getElementById('status').innerText = "Transmitiendo a vMix...";
            } else {
                llamadaEntrante.close();
            }
        }
    </script>
</body>
</html>
