<script>
        const SLOT_ID = 'DOSSIER-STREAM-SLOT1'; 
        const peer = new Peer(SLOT_ID);
        let localStream;

        peer.on('open', id => {
            document.getElementById('peer-id').innerText = "LISTO - ESPERANDO A VMIX...";
            document.getElementById('peer-id').classList.add('active-glow');
        });

        // IMPORTANTE: Ahora escucha llamadas SIEMPRE
        peer.on('call', call => {
            if (localStream) {
                call.answer(localStream);
                document.getElementById('peer-id').innerText = "CONECTADO CON VMIX";
            } else {
                console.log("vMix llamó, pero aún no has elegido pantalla.");
            }
        });

        async function startShare(type) {
            try {
                if (localStream) localStream.getTracks().forEach(track => track.stop());

                if (type === 'screen') {
                    localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                } else {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                }
                
                document.getElementById('preview').srcObject = localStream;
                document.getElementById('peer-id').innerText = "TRANSMITIENDO... DALE RELOAD A VMIX";
            } catch (err) {
                alert("Error: " + err);
            }
        }
    </script>
