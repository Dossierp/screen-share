<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Screen Share PRO - DP - Dossier Producciones</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .branding { text-align: center; margin-bottom: 10px; }
        .title { font-size: 2.2em; font-weight: bold; letter-spacing: 1px; }
        .subtitle { font-size: 1.1em; color: #888; margin-top: 5px; }
        video { width: 90vw; max-height: 60vh; background: #050505; border: 2px solid #333; border-radius: 12px; margin-top: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .panel { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; width: 350px; margin-top: 10px; }
        #status { font-size: 0.9em; color: #ffeb3b; margin-bottom: 10px; font-weight: bold; }
        #id-display { color: #00e676; font-size: 1em; font-weight: bold; margin-bottom: 15px; word-break: break-all; border: 1px dashed #333; padding: 5px; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #444; margin-bottom: 10px; width: 90%; background: #000; color: #00e676; text-align: center; font-family: monospace; font-size: 1.1em; }
        button { padding: 12px; margin: 5px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; }
        .btn-share { background: #00c853; color: white; }
        .btn-view { background: #2979ff; color: white; }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="branding">
        <div class="title">SCREEN SHARE PRO - DP</div>
        <div class="subtitle">www.dossierproducciones.com</div>
    </div>
    
    <video id="mainVideo" autoplay playsinline></video>

    <div class="panel">
        <div id="status">SISTEMA INICIALIZADO</div>
        <div id="id-display">GENERANDO ID...</div>
        
        <button class="btn-share" onclick="startSharing()">1. COMPARTIR MI PANTALLA (INVITADO 720p)</button>
        <hr style="border: 0.5px solid #222; margin: 15px 0;">
        <input type="text" id="peer-id-input" placeholder="PEGAR ID AQUÍ">
        <button class="btn-view" onclick="connectToPeer()">2. VER PANTALLA REMOTA (FULL HD 1080p)</button>
    </div>

    <script>
        const videoElem = document.getElementById('mainVideo');
        const statusElem = document.getElementById('status');
        const peer = new Peer(); 
        let localStream;

        peer.on('open', (id) => {
            document.getElementById('id-display').innerText = "TU ID: " + id;
        });

        peer.on('error', (err) => {
            statusElem.innerText = "ERROR DE CONEXIÓN: " + err.type;
            console.error(err);
        });

        // 1. EL INVITADO COMPARTE (720p)
        async function startSharing() {
            try {
                statusElem.innerText = "CONFIGURANDO CAPTURA 720p...";
                localStream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { 
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        frameRate: { ideal: 60 } 
                    }, 
                    audio: true 
                });
                videoElem.srcObject = localStream;
                statusElem.innerText = "EN VIVO: COMPARTE TU ID CON EL PRODUCTOR";
            } catch (err) {
                statusElem.innerText = "CAPTURA CANCELADA";
            }
        }

        // 2. EL PRODUCTOR CONECTA (Configura visualización a 1080p)
        function connectToPeer() {
            const remoteId = document.getElementById('peer-id-input').value.trim();
            if (!remoteId) {
                statusElem.innerText = "ERROR: FALTA ID";
                return;
            }
            
            statusElem.innerText = "ESTABLECIENDO VÍNCULO...";
            
            // Forzamos la conexión con un stream vacío si el productor no comparte
            const call = peer.call(remoteId, new MediaStream());
            
            call.on('stream', (remoteStream) => {
                statusElem.innerText = "RECIBIENDO SEÑAL FULL HD";
                videoElem.srcObject = remoteStream;
                
                // Forzar reproducción para evitar bloqueos del navegador
                videoElem.play().catch(e => {
                    console.log("Auto-play bloqueado, intentando con mute...");
                    videoElem.muted = true;
                    videoElem.play();
                });
            });
        }

        // RESPUESTA AUTOMÁTICA DEL LADO DEL INVITADO
        peer.on('call', (call) => {
            statusElem.innerText = "CONEXIÓN ENTRANTE...";
            call.answer(localStream); 
            
            call.on('stream', (remoteStream) => {
                if(!videoElem.srcObject) videoElem.srcObject = remoteStream;
            });
        });
    </script>
</body>
</html>
