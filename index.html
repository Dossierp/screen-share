<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Invitado - Screen Share PRO - DP</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --green: #00c853; --red: #d50000; --blue: #2979ff; --black: #000; }
        body { margin: 0; background: var(--black); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .branding { text-align: center; margin-bottom: 10px; }
        .title { font-size: 2.2em; font-weight: bold; }
        .subtitle { font-size: 1.1em; color: #888; margin-top: 5px; }
        video { width: 80vw; max-height: 45vh; background: #050505; border: 2px solid #333; border-radius: 12px; margin-top: 10px; object-fit: contain; }
        .panel { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; width: 360px; margin-top: 10px; }
        button { padding: 15px; margin: 5px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; text-transform: uppercase; font-size: 1em; }
        .btn-share { background: var(--green); color: white; }
        .btn-link { background: var(--blue); color: white; }
        .btn-stop { background: var(--red) !important; }
        #modal-portero { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; border: 3px solid var(--blue); padding: 30px; border-radius: 20px; z-index: 1000; text-align: center; box-shadow: 0 0 100px rgba(0,0,0,1); width: 320px; }
        .modal-btns { display: flex; gap: 15px; margin-top: 25px; }
        .btn-yes { background: var(--green); color: white; }
        .btn-no { background: var(--red); color: white; }
    </style>
</head>
<body>

    <div class="branding">
        <div class="title">SCREEN SHARE PRO - DP</div>
        <div class="subtitle">CONSOLA DE INVITADO</div>
    </div>
    
    <video id="mainVideo" autoplay playsinline muted></video>

    <div class="panel">
        <button id="shareBtn" class="btn-share" onclick="toggleShare()">1. Compartir pantalla</button>
        <button id="linkBtn" class="btn-link" onclick="copyProductorLink()">2. Copiar Link para Producción</button>
    </div>

    <div id="modal-portero">
        <h2 style="margin:0; font-size: 1.3em;">SOLICITUD DE ACCESO</h2>
        <p style="color: #bbb; margin-top: 10px;">¿Deseas enviar tu señal a vMix?</p>
        <div class="modal-btns">
            <button class="btn-yes" onclick="responderPortero(true)">YES</button>
            <button class="btn-no" onclick="responderPortero(false)">NO</button>
        </div>
    </div>

    <script>
        const videoElem = document.getElementById('mainVideo');
        const shareBtn = document.getElementById('shareBtn');
        const modal = document.getElementById('modal-portero');
        let peer = new Peer();
        let localStream = null;
        let incomingCall = null;

        peer.on('open', (id) => { console.log('ID:', id); });

        async function toggleShare() {
            if (!localStream) {
                try {
                    localStream = await navigator.mediaDevices.getDisplayMedia({ 
                        video: { width: 1920, height: 1080, frameRate: 60 }, 
                        audio: true 
                    });
                    videoElem.srcObject = localStream;
                    shareBtn.innerText = "Dejar de compartir";
                    shareBtn.classList.add('btn-stop');
                } catch (e) { console.error(e); }
            } else {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
                videoElem.srcObject = null;
                shareBtn.innerText = "Compartir pantalla";
                shareBtn.classList.remove('btn-stop');
            }
        }

        function copyProductorLink() {
            if (!peer.id) return alert("Cargando conexión...");
            // Crea el link automático hacia la página /remoto
            const link = window.location.href.replace('index.html', '') + "remoto?id=" + peer.id;
            navigator.clipboard.writeText(link);
            alert("Link copiado. Pégalo en tu vMix.");
        }

        peer.on('call', (call) => {
            incomingCall = call;
            modal.style.display = 'block';
        });

        function responderPortero(si) {
            modal.style.display = 'none';
            if (si && incomingCall) {
                incomingCall.answer(localStream);
            } else {
                incomingCall.close();
            }
        }
    </script>
</body>
</html>
