<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dossier Receiver Global</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        video { width: 100vw; height: 100vh; object-fit: contain; }
        #info { position: absolute; bottom: 10px; right: 10px; color: #38bdf8; font: 10px sans-serif; opacity: 0.5; }
    </style>
</head>
<body>
    <video id="videoRemote" autoplay playsinline></video>
    <div id="info">DOSSIER GLOBAL RECEIVER</div>

    <script>
        const TARGET = 'DOSSIER-PROD-LIVE-STREAM-2026';
        const peer = new Peer({
            config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }, { 'urls': 'stun:stun1.l.google.com:19302' }] }
        });

        function conectar() {
            console.log("Intentando conectar con el emisor...");
            const call = peer.call(TARGET, new MediaStream());
            
            call.on('stream', stream => {
                document.getElementById('videoRemote').srcObject = stream;
                document.getElementById('info').innerText = "SEÑAL ESTABLE - LIVE";
            });

            // Si no hay respuesta, reintentar cada 5 segundos
            setTimeout(() => {
                if (!document.getElementById('videoRemote').srcObject) conectar();
            }, 5000);
        }

        peer.on('open', conectar);
        peer.on('error', () => setTimeout(conectar, 5000));
    </script>
</body>
</html>
