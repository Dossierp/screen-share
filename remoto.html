<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FEED vMix - DP</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        video { width: 100vw; height: 100vh; object-fit: contain; }
        #msg { position: absolute; font-family: sans-serif; text-transform: uppercase; font-weight: bold; color: #00c853; }
    </style>
</head>
<body>
    <div id="msg">Buscando señal...</div>
    <video id="v" autoplay playsinline muted></video>

    <script>
        const v = document.getElementById('v');
        const m = document.getElementById('msg');
        const peer = new Peer();
        const idInvitado = new URLSearchParams(window.location.search).get('id');

        function conectar() {
            if (!idInvitado || !peer.open) return;
            
            m.innerText = "SOLICITANDO PANTALLA...";
            const call = peer.call(idInvitado, new MediaStream()); // Llamada de aviso
            
            call.on('stream', s => {
                m.style.display = 'none';
                v.srcObject = s;
                v.play();
            });

            // Si en 3 segundos no hay video, reintenta automáticamente
            setTimeout(() => {
                if (!v.srcObject) conectar();
            }, 3000);
        }

        peer.on('open', conectar);
        document.body.onclick = () => v.play();
    </script>
</body>
</html>
