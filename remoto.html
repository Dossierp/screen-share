<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: black; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #status-bar { position: absolute; bottom: 5px; right: 5px; color: #38bdf8; font: 9px sans-serif; opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>
    <video id="v" autoplay playsinline></video>
    <div id="status-bar">DOSSIER RECEIVER: ESPERANDO...</div>
    <script>
        const TARGET = 'DOSSIER-PROD-STREAM-2026';
        const peer = new Peer({
            config: { 'iceServers': [
                { 'urls': 'stun:stun.l.google.com:19302' },
                { 'urls': 'stun:stun1.l.google.com:19302' },
                { 'urls': 'stun:stun2.l.google.com:19302' }
            ]}
        });
        const status = (txt) => document.getElementById('status-bar').innerText = "DOSSIER: " + txt;

        function conectar() {
            status("BUSCANDO EMISOR...");
            const call = peer.call(TARGET, new MediaStream());
            
            call.on('stream', s => {
                document.getElementById('v').srcObject = s;
                status("LIVE");
            });

            setTimeout(() => {
                if (!document.getElementById('v').srcObject) {
                    status("REINTENTANDO...");
                    conectar();
                }
            }, 5000);
        }

        peer.on('open', () => { status("CONECTADO AL SERVIDOR"); conectar(); });
        peer.on('error', (err) => { status("ERROR: " + err.type); setTimeout(conectar, 5000); });
    </script>
</body>
</html>
