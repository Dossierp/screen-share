<script>
        const TARGET_ID = 'DOSSIER-STREAM-SLOT1';
        const peer = new Peer(); 
        let currentCall = null;

        peer.on('open', () => {
            console.log('Receptor listo.');
            tryConnect(); // Intento inicial
        });

        function tryConnect() {
            // Si ya hay video, no hace nada. Si no, intenta llamar.
            if (!currentCall || !currentCall.open) {
                console.log('Intentando conectar con la laptop...');
                const call = peer.call(TARGET_ID, new MediaStream());
                
                call.on('stream', (remoteStream) => {
                    const video = document.getElementById('remoteVideo');
                    video.srcObject = remoteStream;
                    document.getElementById('info').innerText = "RECIBIENDO SEÑAL LIVE";
                    currentCall = call;
                });

                // Si falla o no hay nadie, reintenta en 3 segundos
                setTimeout(() => {
                    if (!currentCall) tryConnect();
                }, 3000);
            }
        }

        peer.on('error', (err) => {
            console.log('Buscando señal...');
            setTimeout(tryConnect, 3000); // Reintento por cualquier error
        });
    </script>
