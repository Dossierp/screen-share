<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: black; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <video id="v" autoplay playsinline muted></video>

    <script>
        const TARGET = 'DOSSIER-PROD-STREAM-2026';
        const peer = new Peer({
            config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
        });

        function conectar() {
            const call = peer.call(TARGET, new MediaStream());
            
            call.on('stream', s => {
                const video = document.getElementById('v');
                video.srcObject = s;
                // Forzamos el Play por si el navegador lo bloquea
                video.play().catch(e => console.log("Esperando interacción..."));
            });

            setTimeout(() => {
                if (!document.getElementById('v').srcObject) conectar();
            }, 4000);
        }

        peer.on('open', conectar);
        peer.on('error', () => setTimeout(conectar, 4000));
    </script>
</body>
</html>
